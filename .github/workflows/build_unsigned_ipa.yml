name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build unsigned IPA
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p output
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr ../../../output/color_picker-unsigned.ipa Payload/
          cd ../../..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: color_picker-unsigned-ipa
          path: output/color_picker-unsigned.ipa
