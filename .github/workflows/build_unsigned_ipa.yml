name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    name: Build color_picker-unsigned
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r color_picker-unsigned.ipa Payload
          cd -

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: color_picker-unsigned
          path: build/ios/iphoneos/color_picker-unsigned.ipa
          retention-days: 30
